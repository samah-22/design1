<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design1</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">
        <h3>Your Result</h3>
        <div class="scored"><span style="font-size:50px;">76</span>
            <span>of 100</span>
        </div>
        <h2>Great</h2>
        <p>You scored higher than 65% of the people who have taken these tests.</p>

    </div>

    <div class="aside">
        <h3>Summary</h3>

        <div class="reaction"><img src="assets/images/icon-reaction.svg" alt="">Reaction <span>80/100</span></div>
        <div class="memory"><img src="assets/images/icon-memory.svg" alt="">Memory <span>96/100</span></div>
        <div class="verbal"><img src="assets/images/icon-verbal.svg" alt="">Verbal <span>61/100</span></div>
        <div class="visual"><img src="assets/images/icon-visual.svg" alt="">Visual <span>73/100</span></div>
        <button>continue</button>

    </div>

</body>
